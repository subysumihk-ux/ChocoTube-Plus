{% extends "base.html" %}
{% block title %}JSON エディター — Choco-tube-plus{% endblock %}
{% block body_class %}json-editor-page{% endblock %}
{% block content %}
<div class="je-wrap">
  <div class="je-topbar">
    <a href="/tool/programing" class="je-back">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15"><polyline points="15 18 9 12 15 6"/></svg>
      戻る
    </a>
    <span class="je-title">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      JSON エディター
    </span>
    <div class="je-actions">
      <button class="je-btn je-btn-fmt" id="btnFormat">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
        フォーマット
      </button>
      <button class="je-btn je-btn-min" id="btnMinify">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
        圧縮
      </button>
      <button class="je-btn je-btn-copy" id="btnCopy">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        コピー
      </button>
    </div>
  </div>

  <div class="je-body" id="jeBody">
    <div class="je-editors" id="jeEditors">
      <div class="je-editor-header">入力 JSON</div>
      <textarea class="je-textarea" id="code-json" spellcheck="false" placeholder='{"name": "Alice", "age": 28, "hobbies": ["reading", "coding"]}'></textarea>
    </div>

    <div class="je-divider" id="jeDivider">
      <div class="je-divider-handle"></div>
    </div>

    <div class="je-output-wrap" id="jeOutput">
      <div class="je-output-header">
        <span>フォーマット済み</span>
        <span class="je-valid-badge" id="validBadge"></span>
      </div>
      <div class="je-output" id="output"><span class="je-hint">左に JSON を入力すると自動でフォーマットします</span></div>
    </div>
  </div>
</div>

<style>
* { box-sizing: border-box; }
.je-wrap { display: flex; flex-direction: column; height: calc(100vh - 56px); background: var(--bg-primary); }
.je-topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2)); background: var(--bg-secondary); flex-shrink: 0; }
.je-back { display: inline-flex; align-items: center; gap: 4px; font-size: .82rem; color: var(--text-secondary); text-decoration: none; transition: color .15s; white-space: nowrap; }
.je-back:hover { color: var(--text-primary); }
.je-title { display: flex; align-items: center; gap: 6px; font-size: .92rem; font-weight: 600; color: var(--text-primary); flex: 1; }
.je-actions { display: flex; align-items: center; gap: 8px; }
.je-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border: none; border-radius: 7px; font-size: .82rem; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; }
.je-btn:hover { opacity: .85; transform: translateY(-1px); }
.je-btn-fmt { background: #ec4899; color: #fff; }
.je-btn-min { background: var(--bg-tertiary, rgba(128,128,128,.15)); color: var(--text-primary); }
.je-btn-copy { background: var(--bg-tertiary, rgba(128,128,128,.15)); color: var(--text-primary); }
.je-body { display: flex; flex: 1; overflow: hidden; user-select: none; }
.je-editors { display: flex; flex-direction: column; width: 50%; min-width: 120px; overflow: hidden; flex-shrink: 0; }
.je-editor-header { padding: 7px 16px; font-size: .8rem; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2)); background: var(--bg-secondary); flex-shrink: 0; }
.je-output-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 16px; font-size: .8rem; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2)); background: var(--bg-secondary); flex-shrink: 0; }
.je-valid-badge { font-size: .72rem; font-weight: 700; padding: 2px 8px; border-radius: 100px; }
.je-valid-badge.ok { background: #22c55e22; color: #22c55e; }
.je-valid-badge.err { background: #ef444422; color: #ef4444; }
.je-divider { width: 6px; flex-shrink: 0; background: var(--border-color, rgba(128,128,128,.2)); cursor: col-resize; display: flex; align-items: center; justify-content: center; transition: background .15s; }
.je-divider:hover, .je-divider.dragging { background: #ec489944; }
.je-divider-handle { width: 2px; height: 40px; border-radius: 2px; background: var(--text-secondary); opacity: .4; pointer-events: none; }
.je-divider:hover .je-divider-handle, .je-divider.dragging .je-divider-handle { background: #ec4899; opacity: 1; }
.je-textarea { flex: 1; width: 100%; height: 100%; background: var(--bg-primary); color: var(--text-primary); border: none; outline: none; padding: 14px 16px; font-family: 'Courier New', Consolas, monospace; font-size: .88rem; line-height: 1.65; resize: none; tab-size: 2; }
.je-textarea::placeholder { color: var(--text-secondary); opacity: .5; }
.je-output-wrap { display: flex; flex-direction: column; flex: 1; min-width: 120px; overflow: hidden; }
.je-output { flex: 1; overflow-y: auto; padding: 14px 16px; font-family: 'Courier New', Consolas, monospace; font-size: .87rem; line-height: 1.65; background: var(--bg-primary); white-space: pre; }
.je-hint { color: var(--text-secondary); opacity: .5; font-style: italic; white-space: normal; }
.je-err { color: #ef4444; white-space: pre-wrap; }
/* JSON syntax coloring */
.jk { color: #60a5fa; }
.js { color: #34d399; }
.jn { color: #f59e0b; }
.jb { color: #a78bfa; }
.jnull { color: #6b7280; }
@media (max-width: 680px) {
  .je-body { flex-direction: column; }
  .je-editors { width: 100% !important; height: 50%; min-width: unset; }
  .je-divider { width: 100%; height: 6px; cursor: row-resize; }
  .je-divider-handle { width: 40px; height: 2px; }
  .je-output-wrap { width: 100% !important; height: 50%; }
}
</style>

<script>
(function () {
  const codeEl   = document.getElementById('code-json');
  const outputEl = document.getElementById('output');
  const badge    = document.getElementById('validBadge');
  const btnFmt   = document.getElementById('btnFormat');
  const btnMin   = document.getElementById('btnMinify');
  const btnCopy  = document.getElementById('btnCopy');
  const body     = document.getElementById('jeBody');
  const editors  = document.getElementById('jeEditors');
  const divider  = document.getElementById('jeDivider');

  function syntaxHighlight(json) {
    return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
      if (/^"/.test(match)) {
        if (/:$/.test(match)) return `<span class="jk">${match}</span>`;
        return `<span class="js">${match}</span>`;
      }
      if (/true|false/.test(match)) return `<span class="jb">${match}</span>`;
      if (/null/.test(match)) return `<span class="jnull">${match}</span>`;
      return `<span class="jn">${match}</span>`;
    });
  }

  function update() {
    const raw = codeEl.value.trim();
    if (!raw) { outputEl.innerHTML = '<span class="je-hint">左に JSON を入力すると自動でフォーマットします</span>'; badge.textContent = ''; badge.className = 'je-valid-badge'; return; }
    try {
      const parsed = JSON.parse(raw);
      const pretty = JSON.stringify(parsed, null, 2);
      outputEl.innerHTML = syntaxHighlight(pretty.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
      badge.textContent = '✓ 有効';
      badge.className = 'je-valid-badge ok';
    } catch (e) {
      outputEl.innerHTML = '<span class="je-err">' + e.message + '</span>';
      badge.textContent = '✗ エラー';
      badge.className = 'je-valid-badge err';
    }
  }

  let timer;
  codeEl.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(update, 300); });

  btnFmt.addEventListener('click', () => {
    try { codeEl.value = JSON.stringify(JSON.parse(codeEl.value), null, 2); update(); } catch {}
  });
  btnMin.addEventListener('click', () => {
    try { codeEl.value = JSON.stringify(JSON.parse(codeEl.value)); update(); } catch {}
  });
  btnCopy.addEventListener('click', () => {
    const text = outputEl.innerText;
    navigator.clipboard.writeText(text).then(() => {
      const orig = btnCopy.textContent;
      btnCopy.textContent = 'コピーしました！';
      setTimeout(() => { btnCopy.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> コピー'; }, 2000);
    });
  });

  codeEl.addEventListener('keydown', e => {
    if (e.key === 'Tab') { e.preventDefault(); const s = codeEl.selectionStart; codeEl.value = codeEl.value.substring(0, s) + '  ' + codeEl.value.substring(codeEl.selectionEnd); codeEl.selectionStart = codeEl.selectionEnd = s + 2; update(); }
  });

  // Draggable divider
  let dragging = false, startX, startW;
  const isMobile = () => window.innerWidth <= 680;
  divider.addEventListener('mousedown', e => { if (isMobile()) return; dragging = true; startX = e.clientX; startW = editors.getBoundingClientRect().width; divider.classList.add('dragging'); document.body.style.cursor = 'col-resize'; e.preventDefault(); });
  document.addEventListener('mousemove', e => { if (!dragging) return; const totalW = body.getBoundingClientRect().width - divider.offsetWidth; editors.style.width = Math.min(Math.max(startW + (e.clientX - startX), 120), totalW - 120) + 'px'; });
  document.addEventListener('mouseup', () => { if (!dragging) return; dragging = false; divider.classList.remove('dragging'); document.body.style.cursor = ''; });
  divider.addEventListener('touchstart', e => { if (isMobile()) return; dragging = true; startX = e.touches[0].clientX; startW = editors.getBoundingClientRect().width; divider.classList.add('dragging'); e.preventDefault(); }, { passive: false });
  document.addEventListener('touchmove', e => { if (!dragging) return; const totalW = body.getBoundingClientRect().width - divider.offsetWidth; editors.style.width = Math.min(Math.max(startW + (e.touches[0].clientX - startX), 120), totalW - 120) + 'px'; }, { passive: false });
  document.addEventListener('touchend', () => { if (!dragging) return; dragging = false; divider.classList.remove('dragging'); });

  update();
})();
</script>
{% endblock %}
