{% extends "base.html" %}
{% block title %}ワークスペース — Choco-tube-plus{% endblock %}
{% block body_class %}workspace-page{% endblock %}
{% block content %}
<div class="ws-wrap">
  <div class="ws-topbar">
    <a href="/tool/programing" class="ws-back">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15"><polyline points="15 18 9 12 15 6"/></svg>
      戻る
    </a>
    <span class="ws-title">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      ワークスペース
    </span>
    <div class="ws-actions">
      <button class="ws-btn ws-btn-preview" id="btnPreview">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        プレビュー
      </button>
      <button class="ws-btn ws-btn-run" id="btnRun">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        実行（新しいタブ）
      </button>
    </div>
  </div>

  <div class="ws-body">
    <div class="ws-sidebar">
      <div class="ws-sidebar-header">
        <span class="ws-sidebar-label">EXPLORER</span>
        <div class="ws-header-btns">
          <button class="ws-icon-btn" id="btnAddFile" title="新しいファイル">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="14" height="14"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          </button>
          <button class="ws-icon-btn" id="btnAddFolder" title="新しいフォルダ">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="14" height="14"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
          </button>
        </div>
      </div>
      <div class="ws-tree" id="fileTree"></div>
    </div>

    <div class="ws-main" id="wsMain">
      <div class="ws-editor-area" id="wsEditor">
        <div class="ws-editor-header" id="editorHeader">
          <span class="ws-no-file">ファイルを選択してください</span>
        </div>
        <textarea class="ws-textarea" id="codeArea" spellcheck="false" disabled placeholder="左のサイドバーからファイルを選択してください"></textarea>
      </div>
      <div class="ws-divider" id="wsDivider"><div class="ws-divider-handle"></div></div>
      <div class="ws-preview-wrap">
        <div class="ws-preview-header">プレビュー <span class="ws-preview-note" id="previewNote"></span></div>
        <iframe class="ws-preview-frame" id="previewFrame" sandbox="allow-scripts allow-same-origin allow-modals allow-forms"></iframe>
      </div>
    </div>
  </div>
</div>

<!-- Dialog -->
<div class="ws-dialog-overlay" id="dialogOverlay">
  <div class="ws-dialog">
    <div class="ws-dialog-title" id="dialogTitle">新しいファイル</div>
    <div class="ws-dialog-sub" id="dialogSub"></div>
    <input class="ws-dialog-input" id="dialogInput" type="text" autocomplete="off" spellcheck="false">
    <div class="ws-dialog-hint" id="dialogHint"></div>
    <div class="ws-dialog-actions">
      <button class="ws-dialog-btn ws-dialog-cancel" id="dialogCancel">キャンセル</button>
      <button class="ws-dialog-btn ws-dialog-ok" id="dialogOk">作成</button>
    </div>
  </div>
</div>

<style>
* { box-sizing: border-box; }
.ws-wrap { display: flex; flex-direction: column; height: calc(100vh - 56px); background: var(--bg-primary); }

.ws-topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2)); background: var(--bg-secondary); flex-shrink: 0; }
.ws-back { display: inline-flex; align-items: center; gap: 4px; font-size: .82rem; color: var(--text-secondary); text-decoration: none; transition: color .15s; white-space: nowrap; }
.ws-back:hover { color: var(--text-primary); }
.ws-title { display: flex; align-items: center; gap: 6px; font-size: .92rem; font-weight: 600; color: var(--text-primary); flex: 1; }
.ws-actions { display: flex; gap: 8px; }
.ws-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border: none; border-radius: 7px; font-size: .82rem; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; }
.ws-btn:hover { opacity: .85; transform: translateY(-1px); }
.ws-btn-preview { background: var(--bg-tertiary, rgba(128,128,128,.15)); color: var(--text-primary); }
.ws-btn-run { background: #22c55e; color: #fff; }

.ws-body { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.ws-sidebar { width: 210px; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border-color, rgba(128,128,128,.2)); background: var(--bg-secondary); overflow: hidden; }
.ws-sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px 7px 14px; border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2)); flex-shrink: 0; }
.ws-sidebar-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-secondary); }
.ws-header-btns { display: flex; gap: 2px; }
.ws-icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border: none; border-radius: 5px; background: transparent; color: var(--text-secondary); cursor: pointer; transition: background .15s, color .15s; padding: 0; }
.ws-icon-btn:hover { background: rgba(128,128,128,.15); color: var(--text-primary); }

.ws-tree { flex: 1; overflow-y: auto; padding: 4px 0; }

/* Tree nodes */
.ws-dir-row, .ws-file-row { display: flex; align-items: center; border-radius: 5px; margin: 0 4px; cursor: pointer; position: relative; min-height: 26px; }
.ws-dir-row:hover, .ws-file-row:hover { background: rgba(128,128,128,.1); }
.ws-file-row.active { background: rgba(34,197,94,.12); }

.ws-row-indent { flex-shrink: 0; }
.ws-caret { flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; color: var(--text-secondary); transition: transform .15s; }
.ws-caret svg { display: block; }
.ws-caret.open { transform: rotate(90deg); }
.ws-dir-icon, .ws-file-icon { flex-shrink: 0; display: inline-flex; align-items: center; }
.ws-row-name { flex: 1; font-size: .82rem; padding: 4px 4px 4px 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-primary); }
.ws-file-row.active .ws-row-name { color: #22c55e; font-weight: 600; }

/* Row action buttons (show on hover) */
.ws-row-actions { display: none; align-items: center; gap: 1px; padding-right: 4px; flex-shrink: 0; }
.ws-dir-row:hover .ws-row-actions,
.ws-file-row:hover .ws-row-actions { display: flex; }
.ws-row-btn { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border: none; background: transparent; color: var(--text-secondary); border-radius: 3px; cursor: pointer; padding: 0; }
.ws-row-btn:hover { background: rgba(128,128,128,.2); color: var(--text-primary); }
.ws-row-btn.del:hover { color: #ef4444; }

/* Dir children container */
.ws-dir-children { overflow: hidden; }
.ws-dir-children.collapsed { display: none; }

/* File color dots */
.ws-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin: 0 3px; }
.dot-html { background: #f97316; }
.dot-css  { background: #3b82f6; }
.dot-js   { background: #eab308; }
.dot-json { background: #ec4899; }
.dot-md   { background: #8b5cf6; }
.dot-txt  { background: #6b7280; }
.dot-other { background: #6b7280; }

/* Main */
.ws-main { display: flex; flex: 1; overflow: hidden; user-select: none; }
.ws-editor-area { display: flex; flex-direction: column; width: 50%; min-width: 80px; overflow: hidden; flex-shrink: 0; }
.ws-editor-header { display: flex; align-items: center; padding: 6px 12px; border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2)); background: var(--bg-secondary); flex-shrink: 0; font-size: .8rem; min-height: 34px; gap: 6px; }
.ws-no-file { color: var(--text-secondary); font-style: italic; }
.ws-current-file { font-weight: 600; color: var(--text-primary); }
.ws-textarea { flex: 1; width: 100%; background: var(--bg-primary); color: var(--text-primary); border: none; outline: none; padding: 14px 16px; font-family: 'Courier New', Consolas, monospace; font-size: .88rem; line-height: 1.65; resize: none; tab-size: 2; }
.ws-textarea:disabled { opacity: .35; cursor: not-allowed; }
.ws-textarea::placeholder { color: var(--text-secondary); opacity: .5; }

.ws-divider { width: 6px; flex-shrink: 0; background: var(--border-color, rgba(128,128,128,.2)); cursor: col-resize; display: flex; align-items: center; justify-content: center; transition: background .15s; }
.ws-divider:hover, .ws-divider.dragging { background: #22c55e44; }
.ws-divider-handle { width: 2px; height: 40px; border-radius: 2px; background: var(--text-secondary); opacity: .4; pointer-events: none; }
.ws-divider:hover .ws-divider-handle, .ws-divider.dragging .ws-divider-handle { background: #22c55e; opacity: 1; }

.ws-preview-wrap { display: flex; flex-direction: column; flex: 1; min-width: 80px; overflow: hidden; }
.ws-preview-header { display: flex; align-items: center; gap: 8px; padding: 7px 16px; font-size: .8rem; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2)); background: var(--bg-secondary); flex-shrink: 0; }
.ws-preview-note { font-size: .74rem; font-weight: 400; opacity: .6; }
.ws-preview-frame { flex: 1; width: 100%; border: none; background: #fff; }

/* Dialog */
.ws-dialog-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1000; align-items: center; justify-content: center; }
.ws-dialog-overlay.open { display: flex; }
.ws-dialog { background: var(--bg-secondary); border: 1px solid var(--border-color, rgba(128,128,128,.2)); border-radius: 14px; padding: 24px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
.ws-dialog-title { font-size: 1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.ws-dialog-sub { font-size: .78rem; color: var(--text-secondary); margin-bottom: 12px; min-height: 16px; }
.ws-dialog-input { width: 100%; padding: 9px 12px; border: 1px solid var(--border-color, rgba(128,128,128,.2)); border-radius: 8px; background: var(--bg-primary); color: var(--text-primary); font-family: 'Courier New', Consolas, monospace; font-size: .9rem; outline: none; }
.ws-dialog-input:focus { border-color: #22c55e; }
.ws-dialog-hint { font-size: .76rem; color: var(--text-secondary); margin-top: 6px; min-height: 18px; }
.ws-dialog-hint.ok { color: #22c55e; }
.ws-dialog-hint.err { color: #ef4444; }
.ws-dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
.ws-dialog-btn { padding: 7px 18px; border: none; border-radius: 8px; font-size: .85rem; font-weight: 600; cursor: pointer; transition: opacity .15s; }
.ws-dialog-cancel { background: var(--bg-primary); color: var(--text-secondary); }
.ws-dialog-ok { background: #22c55e; color: #fff; }
.ws-dialog-btn:hover { opacity: .85; }

@media (max-width: 700px) {
  .ws-sidebar { width: 160px; }
  .ws-main { flex-direction: column; }
  .ws-editor-area { width: 100% !important; height: 50%; }
  .ws-divider { width: 100%; height: 6px; cursor: row-resize; }
  .ws-divider-handle { width: 40px; height: 2px; }
  .ws-preview-wrap { width: 100% !important; }
}
</style>

<script>
(function () {
  const SUPPORTED_EXT = ['html', 'css', 'js', 'json', 'md', 'txt'];
  const DOT_CLS = { html:'dot-html', css:'dot-css', js:'dot-js', json:'dot-json', md:'dot-md', txt:'dot-txt' };

  // ── State ──────────────────────────────────────────────────────────
  let files = [
    { name: 'index.html', content: `<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Project</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1>Hello, World!</h1>
  <p>ここを編集してみよう。</p>
  <button id="btn">クリック！</button>
  <script src="js/app.js"><\/script>
</body>
</html>` },
    { name: 'css/style.css', content: `body {
  font-family: sans-serif;
  max-width: 600px;
  margin: 40px auto;
  padding: 0 20px;
  background: #f9fafb;
  color: #111;
}
h1 { color: #22c55e; }
button {
  padding: 10px 24px;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
  transition: opacity .2s;
}
button:hover { opacity: .85; }` },
    { name: 'js/app.js', content: `document.getElementById('btn').addEventListener('click', () => {
  alert('クリックされました！');
});` }
  ];

  // Explicit empty folders (Set of folder paths like "images" or "src/components")
  let explicitFolders = new Set();
  // Which folder paths are collapsed
  let collapsedDirs = new Set();
  let currentFile = null;
  let previewTimer = null;

  // ── DOM refs ───────────────────────────────────────────────────────
  const treeEl       = document.getElementById('fileTree');
  const codeArea     = document.getElementById('codeArea');
  const editorHeader = document.getElementById('editorHeader');
  const previewFrame = document.getElementById('previewFrame');
  const previewNote  = document.getElementById('previewNote');
  const overlay      = document.getElementById('dialogOverlay');
  const dialogTitle  = document.getElementById('dialogTitle');
  const dialogSub    = document.getElementById('dialogSub');
  const dialogInput  = document.getElementById('dialogInput');
  const dialogHint   = document.getElementById('dialogHint');

  // ── Helpers ────────────────────────────────────────────────────────
  function ext(name) { const p = name.split('.'); return p.length > 1 ? p.pop().toLowerCase() : ''; }
  function basename(path) { return path.split('/').pop(); }
  function dirname(path) { const p = path.split('/'); p.pop(); return p.join('/'); }
  function dotCls(name) { return DOT_CLS[ext(name)] || 'dot-other'; }

  function defaultContent(name) {
    const e = ext(name);
    const b = basename(name);
    if (e === 'html') return `<!DOCTYPE html>\n<html lang="ja">\n<head>\n  <meta charset="UTF-8">\n  <title>${b}</title>\n</head>\n<body>\n  \n</body>\n</html>`;
    if (e === 'css')  return `/* ${b} */\n`;
    if (e === 'js')   return `// ${b}\n`;
    if (e === 'json') return `{\n  \n}\n`;
    return '';
  }

  function saveCurrentFile() {
    if (currentFile) {
      const f = files.find(f => f.name === currentFile);
      if (f) f.content = codeArea.value;
    }
  }

  // ── Tree building ──────────────────────────────────────────────────
  // Returns node: { dirs: { name: node }, files: [file] }
  function buildTree() {
    const root = { dirs: {}, files: [] };

    function ensureDir(node, parts) {
      let n = node;
      parts.forEach(p => {
        if (!n.dirs[p]) n.dirs[p] = { dirs: {}, files: [] };
        n = n.dirs[p];
      });
      return n;
    }

    explicitFolders.forEach(path => {
      const parts = path.split('/').filter(Boolean);
      ensureDir(root, parts);
    });

    files.forEach(f => {
      const parts = f.name.split('/');
      if (parts.length === 1) {
        root.files.push(f);
      } else {
        const dirParts = parts.slice(0, -1);
        const node = ensureDir(root, dirParts);
        node.files.push(f);
      }
    });

    return root;
  }

  // ── Tree rendering ─────────────────────────────────────────────────
  function renderTree() {
    treeEl.innerHTML = '';
    const tree = buildTree();
    renderNode(treeEl, tree, '', 0);
  }

  function renderNode(container, node, pathPrefix, depth) {
    const INDENT = 10;

    // Folders first (sorted), then files (sorted)
    const sortedDirs = Object.keys(node.dirs).sort((a,b) => a.localeCompare(b));
    const sortedFiles = node.files.slice().sort((a,b) => basename(a.name).localeCompare(basename(b.name)));

    sortedDirs.forEach(dirName => {
      const fullPath = pathPrefix ? pathPrefix + '/' + dirName : dirName;
      const isOpen = !collapsedDirs.has(fullPath);

      // Dir row
      const row = document.createElement('div');
      row.className = 'ws-dir-row';
      row.innerHTML = `
        <span class="ws-row-indent" style="width:${depth * INDENT + 4}px;display:inline-block;flex-shrink:0;"></span>
        <span class="ws-caret${isOpen ? ' open' : ''}">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="10" height="10"><polyline points="9 18 15 12 9 6"/></svg>
        </span>
        <span class="ws-dir-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="margin:0 4px;color:#f59e0b"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </span>
        <span class="ws-row-name">${dirName}</span>
        <span class="ws-row-actions">
          <button class="ws-row-btn add-in-dir" title="このフォルダにファイルを追加">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          </button>
          <button class="ws-row-btn del" title="フォルダを削除">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </button>
        </span>`;

      row.querySelector('.ws-caret').addEventListener('click', e => { e.stopPropagation(); toggleDir(fullPath); });
      row.querySelector('.add-in-dir').addEventListener('click', e => { e.stopPropagation(); openDialog('file', fullPath); });
      row.querySelector('.del').addEventListener('click', e => { e.stopPropagation(); deleteDir(fullPath); });
      row.addEventListener('click', () => toggleDir(fullPath));
      container.appendChild(row);

      // Children container
      const children = document.createElement('div');
      children.className = 'ws-dir-children' + (isOpen ? '' : ' collapsed');
      renderNode(children, node.dirs[dirName], fullPath, depth + 1);
      container.appendChild(children);
    });

    sortedFiles.forEach(f => {
      const row = document.createElement('div');
      row.className = 'ws-file-row' + (currentFile === f.name ? ' active' : '');
      row.innerHTML = `
        <span class="ws-row-indent" style="width:${depth * INDENT + 4}px;display:inline-block;flex-shrink:0;"></span>
        <span style="width:16px;flex-shrink:0;"></span>
        <span class="ws-dot ${dotCls(f.name)}"></span>
        <span class="ws-row-name">${basename(f.name)}</span>
        <span class="ws-row-actions">
          <button class="ws-row-btn del" title="削除">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </span>`;

      row.querySelector('.del').addEventListener('click', e => { e.stopPropagation(); deleteFile(f.name); });
      row.addEventListener('click', e => { if (!e.target.closest('.ws-row-btn')) openFile(f.name); });
      container.appendChild(row);
    });
  }

  function toggleDir(path) {
    if (collapsedDirs.has(path)) collapsedDirs.delete(path);
    else collapsedDirs.add(path);
    renderTree();
  }

  // ── File/Folder operations ─────────────────────────────────────────
  function openFile(name) {
    saveCurrentFile();
    currentFile = name;
    const file = files.find(f => f.name === name);
    codeArea.disabled = false;
    codeArea.value = file ? file.content : '';
    const e2 = ext(name);
    editorHeader.innerHTML = `<span class="ws-dot ${dotCls(name)}" style="flex-shrink:0;"></span><span class="ws-current-file">${name}</span>`;
    renderTree();
    schedulePreview();
  }

  function deleteFile(name) {
    if (!confirm(`"${name}" を削除しますか？`)) return;
    files = files.filter(f => f.name !== name);
    if (currentFile === name) {
      currentFile = null;
      codeArea.disabled = true;
      codeArea.value = '';
      editorHeader.innerHTML = '<span class="ws-no-file">ファイルを選択してください</span>';
    }
    renderTree();
    schedulePreview();
  }

  function deleteDir(path) {
    const insideFiles = files.filter(f => f.name.startsWith(path + '/'));
    const msg = insideFiles.length > 0
      ? `"${path}" フォルダと中の ${insideFiles.length} 個のファイルを削除しますか？`
      : `"${path}" フォルダを削除しますか？`;
    if (!confirm(msg)) return;
    files = files.filter(f => !f.name.startsWith(path + '/'));
    explicitFolders.delete(path);
    // Remove nested explicit folders
    [...explicitFolders].forEach(fp => { if (fp.startsWith(path + '/')) explicitFolders.delete(fp); });
    if (currentFile && currentFile.startsWith(path + '/')) {
      currentFile = null;
      codeArea.disabled = true;
      codeArea.value = '';
      editorHeader.innerHTML = '<span class="ws-no-file">ファイルを選択してください</span>';
    }
    renderTree();
    schedulePreview();
  }

  // ── Build project ──────────────────────────────────────────────────
  function buildProject() {
    saveCurrentFile();
    const htmlFile = files.find(f => f.name === 'index.html') || files.find(f => ext(f.name) === 'html');
    if (!htmlFile) return null;
    const fileMap = {};
    files.forEach(f => { fileMap[f.name] = f.content; });
    let html = htmlFile.content;
    // Inline CSS
    html = html.replace(/<link([^>]+)href=["']([^"']+)["']([^>]*)\/?>/gi, (m, b, href, a) => {
      if ((b + a).toLowerCase().includes('stylesheet') && fileMap[href] !== undefined)
        return `<style>${fileMap[href]}</style>`;
      if (fileMap[href] !== undefined && href.endsWith('.css'))
        return `<style>${fileMap[href]}</style>`;
      return m;
    });
    // Inline JS
    html = html.replace(/<script([^>]*)src=["']([^"']+)["']([^>]*)><\/script>/gi, (m, b, src, a) => {
      if (fileMap[src] !== undefined) return `<script${b}${a}>${fileMap[src]}<\/script>`;
      return m;
    });
    return html;
  }

  // ── Preview ────────────────────────────────────────────────────────
  function updatePreview() {
    const html = buildProject();
    if (!html) { previewNote.textContent = 'index.html が見つかりません'; previewFrame.srcdoc = ''; return; }
    previewNote.textContent = '';
    previewFrame.srcdoc = html;
  }

  function schedulePreview() {
    clearTimeout(previewTimer);
    previewTimer = setTimeout(updatePreview, 500);
  }

  codeArea.addEventListener('input', schedulePreview);
  codeArea.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = codeArea.selectionStart;
      codeArea.value = codeArea.value.substring(0, s) + '  ' + codeArea.value.substring(codeArea.selectionEnd);
      codeArea.selectionStart = codeArea.selectionEnd = s + 2;
      schedulePreview();
    }
  });

  document.getElementById('btnPreview').addEventListener('click', updatePreview);
  document.getElementById('btnRun').addEventListener('click', () => {
    const html = buildProject();
    if (!html) { alert('HTML ファイル（index.html）が必要です'); return; }
    const win = window.open('about:blank', '_blank');
    win.document.open(); win.document.write(html); win.document.close();
  });

  // ── Dialog ─────────────────────────────────────────────────────────
  let dialogMode = 'file';   // 'file' | 'folder'
  let dialogParent = '';     // pre-set parent folder path

  function openDialog(mode, parent = '') {
    dialogMode = mode;
    dialogParent = parent;
    dialogInput.value = '';
    dialogHint.textContent = '';
    dialogHint.className = 'ws-dialog-hint';

    if (mode === 'file') {
      dialogTitle.textContent = '新しいファイル';
      dialogSub.textContent = parent ? `作成先: ${parent}/` : '';
      dialogInput.placeholder = parent ? 'ファイル名 (例: index.html)' : 'パス (例: script.js, css/style.css)';
    } else {
      dialogTitle.textContent = '新しいフォルダ';
      dialogSub.textContent = parent ? `作成先: ${parent}/` : '';
      dialogInput.placeholder = parent ? 'フォルダ名' : 'パス (例: images, src/components)';
    }

    overlay.classList.add('open');
    setTimeout(() => dialogInput.focus(), 50);
  }

  function closeDialog() { overlay.classList.remove('open'); }

  function validateDialog() {
    const raw = dialogInput.value.trim();
    if (!raw) { dialogHint.textContent = ''; dialogHint.className = 'ws-dialog-hint'; return; }

    const fullPath = dialogParent ? dialogParent + '/' + raw : raw;

    if (dialogMode === 'file') {
      const e2 = ext(raw.split('/').pop());
      if (!e2 || !SUPPORTED_EXT.includes(e2)) {
        dialogHint.textContent = `未対応の形式です（対応: ${SUPPORTED_EXT.join(', ')}）`;
        dialogHint.className = 'ws-dialog-hint err';
      } else if (files.find(f => f.name === fullPath)) {
        dialogHint.textContent = 'そのパスは既に存在します';
        dialogHint.className = 'ws-dialog-hint err';
      } else {
        dialogHint.textContent = `✓ 作成先: ${fullPath}`;
        dialogHint.className = 'ws-dialog-hint ok';
      }
    } else {
      if (raw.includes('.')) {
        dialogHint.textContent = 'フォルダ名に拡張子は不要です';
        dialogHint.className = 'ws-dialog-hint err';
      } else if (explicitFolders.has(fullPath)) {
        dialogHint.textContent = 'そのフォルダは既に存在します';
        dialogHint.className = 'ws-dialog-hint err';
      } else {
        dialogHint.textContent = `✓ 作成先: ${fullPath}/`;
        dialogHint.className = 'ws-dialog-hint ok';
      }
    }
  }

  function submitDialog() {
    const raw = dialogInput.value.trim();
    if (!raw) return;
    const fullPath = dialogParent ? dialogParent + '/' + raw : raw;

    if (dialogMode === 'file') {
      const e2 = ext(raw.split('/').pop());
      if (!e2 || !SUPPORTED_EXT.includes(e2)) return;
      if (files.find(f => f.name === fullPath)) return;
      files.push({ name: fullPath, content: defaultContent(fullPath) });
      closeDialog();
      renderTree();
      // Auto-expand parent folders
      fullPath.split('/').slice(0, -1).reduce((acc, part) => {
        const p = acc ? acc + '/' + part : part;
        collapsedDirs.delete(p);
        return p;
      }, '');
      renderTree();
      openFile(fullPath);
    } else {
      if (raw.includes('.')) return;
      if (explicitFolders.has(fullPath)) return;
      explicitFolders.add(fullPath);
      collapsedDirs.delete(fullPath);
      closeDialog();
      renderTree();
    }
  }

  dialogInput.addEventListener('input', validateDialog);
  dialogInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') submitDialog();
    if (e.key === 'Escape') closeDialog();
  });
  document.getElementById('dialogOk').addEventListener('click', submitDialog);
  document.getElementById('dialogCancel').addEventListener('click', closeDialog);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeDialog(); });

  document.getElementById('btnAddFile').addEventListener('click', () => openDialog('file'));
  document.getElementById('btnAddFolder').addEventListener('click', () => openDialog('folder'));

  // ── Draggable divider ──────────────────────────────────────────────
  const wsMain   = document.getElementById('wsMain');
  const wsEditor = document.getElementById('wsEditor');
  const divider  = document.getElementById('wsDivider');
  let dragging = false, startX, startW;
  const isMobile = () => window.innerWidth <= 700;

  divider.addEventListener('mousedown', e => {
    if (isMobile()) return;
    dragging = true; startX = e.clientX; startW = wsEditor.getBoundingClientRect().width;
    divider.classList.add('dragging'); document.body.style.cursor = 'col-resize'; e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const total = wsMain.getBoundingClientRect().width - divider.offsetWidth;
    wsEditor.style.width = Math.min(Math.max(startW + (e.clientX - startX), 80), total - 80) + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return; dragging = false; divider.classList.remove('dragging'); document.body.style.cursor = '';
  });
  divider.addEventListener('touchstart', e => {
    if (isMobile()) return;
    dragging = true; startX = e.touches[0].clientX; startW = wsEditor.getBoundingClientRect().width;
    divider.classList.add('dragging'); e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const total = wsMain.getBoundingClientRect().width - divider.offsetWidth;
    wsEditor.style.width = Math.min(Math.max(startW + (e.touches[0].clientX - startX), 80), total - 80) + 'px';
  }, { passive: false });
  document.addEventListener('touchend', () => { if (dragging) { dragging = false; divider.classList.remove('dragging'); } });

  // ── Init ───────────────────────────────────────────────────────────
  renderTree();
  openFile('index.html');
})();
</script>
