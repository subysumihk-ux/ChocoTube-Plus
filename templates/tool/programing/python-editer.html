{% extends "base.html" %}
{% block title %}Python エディター — Choco-tube-plus{% endblock %}
{% block body_class %}python-editor-page{% endblock %}
{% block content %}
<div class="pe-wrap">
  <div class="pe-topbar">
    <a href="/tool/programing" class="pe-back">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15"><polyline points="15 18 9 12 15 6"/></svg>
      戻る
    </a>
    <span class="pe-title">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Python エディター
    </span>
    <div class="pe-actions">
      <span class="pe-status" id="pyStatus">読み込み中…</span>
      <button class="pe-btn pe-btn-run" id="btnRun" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><polygon points="5,3 19,12 5,21"/></svg>
        実行
      </button>
      <button class="pe-btn pe-btn-clear" id="btnClear">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        出力クリア
      </button>
    </div>
  </div>

  <div class="pe-body" id="peBody">
    <div class="pe-editors" id="peEditors">
      <div class="pe-editor-header">コード</div>
      <textarea class="pe-textarea" id="code-python" spellcheck="false" placeholder="# Python コードをここに書いてください
print('Hello, World!')"></textarea>
    </div>

    <div class="pe-divider" id="peDivider">
      <div class="pe-divider-handle"></div>
    </div>

    <div class="pe-output-wrap" id="peOutput">
      <div class="pe-output-header">出力</div>
      <div class="pe-output" id="output"><span class="pe-hint">実行ボタンを押すとここに結果が表示されます</span></div>
    </div>
  </div>
</div>

<style>
* { box-sizing: border-box; }
.pe-wrap {
  display: flex; flex-direction: column;
  height: calc(100vh - 56px);
  background: var(--bg-primary);
}
.pe-topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2));
  background: var(--bg-secondary);
  flex-shrink: 0;
}
.pe-back {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: .82rem; color: var(--text-secondary); text-decoration: none;
  transition: color .15s; white-space: nowrap;
}
.pe-back:hover { color: var(--text-primary); }
.pe-title {
  display: flex; align-items: center; gap: 6px;
  font-size: .92rem; font-weight: 600; color: var(--text-primary);
  flex: 1;
}
.pe-actions { display: flex; align-items: center; gap: 8px; }
.pe-status {
  font-size: .78rem; color: var(--text-secondary);
  white-space: nowrap;
}
.pe-status.ready { color: #22c55e; }
.pe-status.running { color: #f59e0b; }
.pe-status.error { color: #ef4444; }
.pe-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border: none; border-radius: 7px;
  font-size: .82rem; font-weight: 600; cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.pe-btn:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
.pe-btn:disabled { opacity: .4; cursor: not-allowed; }
.pe-btn-run { background: #3b82f6; color: #fff; }
.pe-btn-clear { background: var(--bg-tertiary, rgba(128,128,128,.15)); color: var(--text-primary); }

.pe-body {
  display: flex; flex: 1; overflow: hidden;
  user-select: none;
}

.pe-editors {
  display: flex; flex-direction: column;
  width: 50%; min-width: 120px;
  overflow: hidden; flex-shrink: 0;
}

.pe-editor-header, .pe-output-header {
  padding: 7px 16px;
  font-size: .8rem; font-weight: 600;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2));
  background: var(--bg-secondary);
  flex-shrink: 0;
}

.pe-divider {
  width: 6px; flex-shrink: 0;
  background: var(--border-color, rgba(128,128,128,.2));
  cursor: col-resize;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.pe-divider:hover, .pe-divider.dragging {
  background: #3b82f644;
}
.pe-divider-handle {
  width: 2px; height: 40px; border-radius: 2px;
  background: var(--text-secondary); opacity: .4;
  pointer-events: none;
}
.pe-divider:hover .pe-divider-handle,
.pe-divider.dragging .pe-divider-handle {
  background: #3b82f6; opacity: 1;
}

.pe-textarea {
  flex: 1; width: 100%; height: 100%;
  background: var(--bg-primary);
  color: var(--text-primary);
  border: none; outline: none;
  padding: 14px 16px;
  font-family: 'Courier New', Consolas, monospace;
  font-size: .88rem; line-height: 1.65;
  resize: none;
  tab-size: 4;
}
.pe-textarea::placeholder { color: var(--text-secondary); opacity: .5; }

.pe-output-wrap {
  display: flex; flex-direction: column;
  flex: 1; min-width: 120px; overflow: hidden;
}

.pe-output {
  flex: 1; overflow-y: auto;
  padding: 14px 16px;
  font-family: 'Courier New', Consolas, monospace;
  font-size: .87rem; line-height: 1.65;
  background: var(--bg-primary);
  color: var(--text-primary);
  white-space: pre-wrap; word-break: break-all;
}
.pe-hint { color: var(--text-secondary); opacity: .5; font-style: italic; }
.pe-out-line { color: var(--text-primary); }
.pe-err-line { color: #ef4444; }
.pe-info-line { color: #6b7280; font-style: italic; }

@media (max-width: 680px) {
  .pe-body { flex-direction: column; }
  .pe-editors { width: 100% !important; height: 50%; min-width: unset; }
  .pe-divider { width: 100%; height: 6px; cursor: row-resize; }
  .pe-divider-handle { width: 40px; height: 2px; }
  .pe-output-wrap { width: 100% !important; height: 50%; }
}
</style>

<script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>
<script>
(function () {
  const codeEl  = document.getElementById('code-python');
  const outputEl = document.getElementById('output');
  const btnRun  = document.getElementById('btnRun');
  const btnClear = document.getElementById('btnClear');
  const statusEl = document.getElementById('pyStatus');
  const body    = document.getElementById('peBody');
  const editors = document.getElementById('peEditors');
  const divider = document.getElementById('peDivider');

  let pyodide = null;

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'pe-status' + (cls ? ' ' + cls : '');
  }

  function appendOutput(text, cls) {
    const line = document.createElement('span');
    line.className = cls;
    line.textContent = text;
    outputEl.appendChild(line);
    outputEl.scrollTop = outputEl.scrollHeight;
  }

  async function loadPy() {
    setStatus('読み込み中…');
    try {
      pyodide = await loadPyodide();
      pyodide.setStdout({ batched: (s) => appendOutput(s + '\n', 'pe-out-line') });
      pyodide.setStderr({ batched: (s) => appendOutput(s + '\n', 'pe-err-line') });
      setStatus('準備完了', 'ready');
      btnRun.disabled = false;
    } catch (e) {
      setStatus('読み込み失敗', 'error');
      appendOutput('Pyodide の読み込みに失敗しました: ' + e.message + '\n', 'pe-err-line');
    }
  }

  async function runCode() {
    if (!pyodide) return;
    btnRun.disabled = true;
    setStatus('実行中…', 'running');
    outputEl.innerHTML = '';
    const code = codeEl.value;
    try {
      await pyodide.runPythonAsync(code);
    } catch (e) {
      appendOutput(e.message + '\n', 'pe-err-line');
    }
    setStatus('準備完了', 'ready');
    btnRun.disabled = false;
  }

  btnRun.addEventListener('click', runCode);

  btnClear.addEventListener('click', () => {
    outputEl.innerHTML = '<span class="pe-hint">実行ボタンを押すとここに結果が表示されます</span>';
  });

  codeEl.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = codeEl.selectionStart;
      const v = codeEl.value;
      codeEl.value = v.substring(0, s) + '    ' + v.substring(codeEl.selectionEnd);
      codeEl.selectionStart = codeEl.selectionEnd = s + 4;
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      runCode();
    }
  });

  // Draggable divider
  let dragging = false;
  let startX, startW;
  const isMobile = () => window.innerWidth <= 680;

  divider.addEventListener('mousedown', e => {
    if (isMobile()) return;
    dragging = true;
    startX = e.clientX;
    startW = editors.getBoundingClientRect().width;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    e.preventDefault();
  });

  divider.addEventListener('touchstart', e => {
    if (isMobile()) return;
    dragging = true;
    startX = e.touches[0].clientX;
    startW = editors.getBoundingClientRect().width;
    divider.classList.add('dragging');
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const totalW = body.getBoundingClientRect().width - divider.offsetWidth;
    const newW = Math.min(Math.max(startW + (e.clientX - startX), 120), totalW - 120);
    editors.style.width = newW + 'px';
  });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const totalW = body.getBoundingClientRect().width - divider.offsetWidth;
    const newW = Math.min(Math.max(startW + (e.touches[0].clientX - startX), 120), totalW - 120);
    editors.style.width = newW + 'px';
  }, { passive: false });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
  });

  document.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
  });

  loadPy();
})();
</script>
{% endblock %}
