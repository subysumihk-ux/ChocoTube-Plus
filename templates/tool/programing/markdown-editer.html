{% extends "base.html" %}
{% block title %}Markdown エディター — Choco-tube-plus{% endblock %}
{% block body_class %}md-editor-page{% endblock %}
{% block content %}
<div class="me-wrap">
  <div class="me-topbar">
    <a href="/tool/programing" class="me-back">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15"><polyline points="15 18 9 12 15 6"/></svg>
      戻る
    </a>
    <span class="me-title">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8v8M7 12h4M15 8v8M11 8h4"/></svg>
      Markdown エディター
    </span>
    <div class="me-actions">
      <button class="me-btn me-btn-copy" id="btnCopy">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        HTMLをコピー
      </button>
    </div>
  </div>

  <div class="me-body" id="meBody">
    <div class="me-editors" id="meEditors">
      <div class="me-editor-header">Markdown</div>
      <textarea class="me-textarea" id="code-md" spellcheck="false" placeholder="# 見出し

**太字** や *斜体* も使えます。

- リスト1
- リスト2

> 引用文

\`\`\`js
console.log('コードブロック');
\`\`\`"></textarea>
    </div>

    <div class="me-divider" id="meDivider">
      <div class="me-divider-handle"></div>
    </div>

    <div class="me-preview-wrap" id="mePreview">
      <div class="me-preview-header">プレビュー</div>
      <div class="me-preview markdown-body" id="preview"></div>
    </div>
  </div>
</div>

<style>
* { box-sizing: border-box; }
.me-wrap { display: flex; flex-direction: column; height: calc(100vh - 56px); background: var(--bg-primary); }
.me-topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2)); background: var(--bg-secondary); flex-shrink: 0; }
.me-back { display: inline-flex; align-items: center; gap: 4px; font-size: .82rem; color: var(--text-secondary); text-decoration: none; transition: color .15s; white-space: nowrap; }
.me-back:hover { color: var(--text-primary); }
.me-title { display: flex; align-items: center; gap: 6px; font-size: .92rem; font-weight: 600; color: var(--text-primary); flex: 1; }
.me-actions { display: flex; gap: 8px; }
.me-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border: none; border-radius: 7px; font-size: .82rem; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; }
.me-btn:hover { opacity: .85; transform: translateY(-1px); }
.me-btn-copy { background: #8b5cf6; color: #fff; }
.me-body { display: flex; flex: 1; overflow: hidden; user-select: none; }
.me-editors { display: flex; flex-direction: column; width: 50%; min-width: 120px; overflow: hidden; flex-shrink: 0; }
.me-editor-header, .me-preview-header { padding: 7px 16px; font-size: .8rem; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2)); background: var(--bg-secondary); flex-shrink: 0; }
.me-divider { width: 6px; flex-shrink: 0; background: var(--border-color, rgba(128,128,128,.2)); cursor: col-resize; display: flex; align-items: center; justify-content: center; transition: background .15s; }
.me-divider:hover, .me-divider.dragging { background: #8b5cf644; }
.me-divider-handle { width: 2px; height: 40px; border-radius: 2px; background: var(--text-secondary); opacity: .4; pointer-events: none; }
.me-divider:hover .me-divider-handle, .me-divider.dragging .me-divider-handle { background: #8b5cf6; opacity: 1; }
.me-textarea { flex: 1; width: 100%; height: 100%; background: var(--bg-primary); color: var(--text-primary); border: none; outline: none; padding: 14px 16px; font-family: 'Courier New', Consolas, monospace; font-size: .88rem; line-height: 1.65; resize: none; tab-size: 2; }
.me-textarea::placeholder { color: var(--text-secondary); opacity: .5; }
.me-preview-wrap { display: flex; flex-direction: column; flex: 1; min-width: 120px; overflow: hidden; }
.me-preview { flex: 1; overflow-y: auto; padding: 20px 24px; color: var(--text-primary); background: var(--bg-primary); }
.markdown-body h1,.markdown-body h2,.markdown-body h3,.markdown-body h4,.markdown-body h5,.markdown-body h6 { font-weight: 700; margin: 1.2em 0 .5em; color: var(--text-primary); line-height: 1.3; }
.markdown-body h1 { font-size: 1.8rem; border-bottom: 2px solid var(--border-color, rgba(128,128,128,.2)); padding-bottom: .3em; }
.markdown-body h2 { font-size: 1.4rem; border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2)); padding-bottom: .2em; }
.markdown-body h3 { font-size: 1.15rem; }
.markdown-body p { margin: .8em 0; line-height: 1.75; }
.markdown-body a { color: #60a5fa; text-decoration: underline; }
.markdown-body strong { font-weight: 700; }
.markdown-body em { font-style: italic; }
.markdown-body code { font-family: 'Courier New', Consolas, monospace; font-size: .88em; background: var(--bg-secondary); padding: .15em .4em; border-radius: 4px; }
.markdown-body pre { background: var(--bg-secondary); border-radius: 8px; padding: 14px 16px; overflow-x: auto; margin: 1em 0; }
.markdown-body pre code { background: none; padding: 0; font-size: .86rem; }
.markdown-body blockquote { border-left: 4px solid #8b5cf6; margin: 1em 0; padding: .5em 1em; background: var(--bg-secondary); color: var(--text-secondary); border-radius: 0 6px 6px 0; }
.markdown-body ul,.markdown-body ol { margin: .8em 0; padding-left: 1.8em; }
.markdown-body li { margin: .3em 0; line-height: 1.65; }
.markdown-body table { border-collapse: collapse; width: 100%; margin: 1em 0; }
.markdown-body th { background: var(--bg-secondary); font-weight: 600; padding: 8px 14px; border: 1px solid var(--border-color, rgba(128,128,128,.2)); }
.markdown-body td { padding: 7px 14px; border: 1px solid var(--border-color, rgba(128,128,128,.2)); }
.markdown-body tr:nth-child(even) td { background: var(--bg-secondary); }
.markdown-body hr { border: none; border-top: 1px solid var(--border-color, rgba(128,128,128,.2)); margin: 1.5em 0; }
.markdown-body img { max-width: 100%; border-radius: 6px; }
@media (max-width: 680px) {
  .me-body { flex-direction: column; }
  .me-editors { width: 100% !important; height: 50%; min-width: unset; }
  .me-divider { width: 100%; height: 6px; cursor: row-resize; }
  .me-divider-handle { width: 40px; height: 2px; }
  .me-preview-wrap { width: 100% !important; height: 50%; }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function () {
  const codeEl   = document.getElementById('code-md');
  const previewEl = document.getElementById('preview');
  const btnCopy  = document.getElementById('btnCopy');
  const body     = document.getElementById('meBody');
  const editors  = document.getElementById('meEditors');
  const divider  = document.getElementById('meDivider');

  marked.setOptions({ breaks: true, gfm: true });

  function updatePreview() {
    previewEl.innerHTML = marked.parse(codeEl.value);
  }

  let timer;
  codeEl.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(updatePreview, 200); });
  codeEl.addEventListener('keydown', e => {
    if (e.key === 'Tab') { e.preventDefault(); const s = codeEl.selectionStart; codeEl.value = codeEl.value.substring(0, s) + '  ' + codeEl.value.substring(codeEl.selectionEnd); codeEl.selectionStart = codeEl.selectionEnd = s + 2; updatePreview(); }
  });

  btnCopy.addEventListener('click', () => {
    navigator.clipboard.writeText(previewEl.innerHTML).then(() => {
      btnCopy.textContent = 'コピーしました！';
      setTimeout(() => { btnCopy.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> HTMLをコピー'; }, 2000);
    });
  });

  // Draggable divider
  let dragging = false, startX, startW;
  const isMobile = () => window.innerWidth <= 680;
  divider.addEventListener('mousedown', e => { if (isMobile()) return; dragging = true; startX = e.clientX; startW = editors.getBoundingClientRect().width; divider.classList.add('dragging'); document.body.style.cursor = 'col-resize'; e.preventDefault(); });
  document.addEventListener('mousemove', e => { if (!dragging) return; const totalW = body.getBoundingClientRect().width - divider.offsetWidth; editors.style.width = Math.min(Math.max(startW + (e.clientX - startX), 120), totalW - 120) + 'px'; });
  document.addEventListener('mouseup', () => { if (!dragging) return; dragging = false; divider.classList.remove('dragging'); document.body.style.cursor = ''; });
  divider.addEventListener('touchstart', e => { if (isMobile()) return; dragging = true; startX = e.touches[0].clientX; startW = editors.getBoundingClientRect().width; divider.classList.add('dragging'); e.preventDefault(); }, { passive: false });
  document.addEventListener('touchmove', e => { if (!dragging) return; const totalW = body.getBoundingClientRect().width - divider.offsetWidth; editors.style.width = Math.min(Math.max(startW + (e.touches[0].clientX - startX), 120), totalW - 120) + 'px'; }, { passive: false });
  document.addEventListener('touchend', () => { if (!dragging) return; dragging = false; divider.classList.remove('dragging'); });

  updatePreview();
})();
</script>
{% endblock %}
