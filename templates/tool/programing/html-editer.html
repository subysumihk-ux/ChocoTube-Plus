{% extends "base.html" %}
{% block title %}HTML エディター — Choco-tube-plus{% endblock %}
{% block body_class %}html-editor-page{% endblock %}
{% block content %}
<div class="he-wrap">
  <div class="he-topbar">
    <a href="/tool/programing" class="he-back">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15"><polyline points="15 18 9 12 15 6"/></svg>
      戻る
    </a>
    <span class="he-title">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      HTML エディター
    </span>
    <div class="he-actions">
      <button class="he-btn he-btn-run" id="btnNewTab" title="新しいタブで実行">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        実行（新しいタブ）
      </button>
    </div>
  </div>

  <div class="he-body" id="heBody">
    <div class="he-editors" id="heEditors">
      <div class="he-tab-bar">
        <button class="he-tab active" data-tab="html">HTML</button>
        <button class="he-tab" data-tab="css">CSS</button>
        <button class="he-tab" data-tab="js">JavaScript</button>
      </div>
      <div class="he-editor-panels">
        <div class="he-panel active" id="panel-html">
          <textarea class="he-textarea" id="code-html" spellcheck="false" placeholder="<!-- HTML をここに書いてください -->"></textarea>
        </div>
        <div class="he-panel" id="panel-css">
          <textarea class="he-textarea" id="code-css" spellcheck="false" placeholder="/* CSS をここに書いてください */"></textarea>
        </div>
        <div class="he-panel" id="panel-js">
          <textarea class="he-textarea" id="code-js" spellcheck="false" placeholder="// JavaScript をここに書いてください"></textarea>
        </div>
      </div>
    </div>

    <div class="he-divider" id="heDivider">
      <div class="he-divider-handle"></div>
    </div>

    <div class="he-preview-wrap" id="hePreview">
      <div class="he-preview-label">プレビュー</div>
      <iframe class="he-preview" id="preview" sandbox="allow-scripts allow-same-origin allow-modals allow-forms"></iframe>
    </div>
  </div>
</div>

<style>
* { box-sizing: border-box; }
.he-wrap {
  display: flex; flex-direction: column;
  height: calc(100vh - 56px);
  background: var(--bg-primary);
}
.he-topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2));
  background: var(--bg-secondary);
  flex-shrink: 0;
}
.he-back {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: .82rem; color: var(--text-secondary); text-decoration: none;
  transition: color .15s; white-space: nowrap;
}
.he-back:hover { color: var(--text-primary); }
.he-title {
  display: flex; align-items: center; gap: 6px;
  font-size: .92rem; font-weight: 600; color: var(--text-primary);
  flex: 1;
}
.he-actions { display: flex; gap: 8px; }
.he-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border: none; border-radius: 7px;
  font-size: .82rem; font-weight: 600; cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.he-btn:hover { opacity: .85; transform: translateY(-1px); }
.he-btn-run { background: #22c55e; color: #fff; }

.he-body {
  display: flex; flex: 1; overflow: hidden;
  user-select: none;
}

.he-editors {
  display: flex; flex-direction: column;
  width: 50%; min-width: 120px;
  overflow: hidden; flex-shrink: 0;
}

.he-divider {
  width: 6px; flex-shrink: 0;
  background: var(--border-color, rgba(128,128,128,.2));
  cursor: col-resize;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
  position: relative;
}
.he-divider:hover, .he-divider.dragging {
  background: #22c55e44;
}
.he-divider-handle {
  width: 2px; height: 40px; border-radius: 2px;
  background: var(--text-secondary);
  opacity: .4;
  pointer-events: none;
}
.he-divider:hover .he-divider-handle,
.he-divider.dragging .he-divider-handle {
  background: #22c55e; opacity: 1;
}

.he-tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2));
  background: var(--bg-secondary);
  flex-shrink: 0;
}
.he-tab {
  padding: 8px 18px;
  border: none; background: none;
  font-size: .84rem; font-weight: 500;
  color: var(--text-secondary); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.he-tab:hover { color: var(--text-primary); }
.he-tab.active { color: #22c55e; border-bottom-color: #22c55e; }

.he-editor-panels { flex: 1; overflow: hidden; position: relative; }
.he-panel { display: none; height: 100%; }
.he-panel.active { display: flex; }

.he-textarea {
  flex: 1; width: 100%; height: 100%;
  background: var(--bg-primary);
  color: var(--text-primary);
  border: none; outline: none;
  padding: 14px 16px;
  font-family: 'Courier New', Consolas, monospace;
  font-size: .88rem; line-height: 1.65;
  resize: none;
  tab-size: 2;
}
.he-textarea::placeholder { color: var(--text-secondary); opacity: .5; }

.he-preview-wrap {
  display: flex; flex-direction: column;
  flex: 1; min-width: 120px; overflow: hidden;
}
.he-preview-label {
  padding: 8px 16px;
  font-size: .8rem; font-weight: 600;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2));
  background: var(--bg-secondary);
  flex-shrink: 0;
}
.he-preview {
  flex: 1; width: 100%; border: none;
  background: #fff;
}

@media (max-width: 680px) {
  .he-body { flex-direction: column; }
  .he-editors { width: 100% !important; height: 50%; min-width: unset; }
  .he-divider { width: 100%; height: 6px; cursor: row-resize; }
  .he-divider-handle { width: 40px; height: 2px; }
  .he-preview-wrap { width: 100% !important; height: 50%; }
}
</style>

<script>
(function () {
  const htmlEl = document.getElementById('code-html');
  const cssEl  = document.getElementById('code-css');
  const jsEl   = document.getElementById('code-js');
  const frame  = document.getElementById('preview');
  const body   = document.getElementById('heBody');
  const editors = document.getElementById('heEditors');
  const divider = document.getElementById('heDivider');

  function buildDoc() {
    return `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
${cssEl.value}
</style>
</head>
<body>
${htmlEl.value}
<script>
${jsEl.value}
<\/script>
</body>
</html>`;
  }

  function updatePreview() {
    const doc = buildDoc();
    const blob = new Blob([doc], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    frame.src  = url;
  }

  let timer;
  function scheduleUpdate() {
    clearTimeout(timer);
    timer = setTimeout(updatePreview, 400);
  }

  htmlEl.addEventListener('input', scheduleUpdate);
  cssEl.addEventListener('input', scheduleUpdate);
  jsEl.addEventListener('input', scheduleUpdate);

  document.querySelectorAll('.he-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.he-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.he-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    });
  });

  document.getElementById('btnNewTab').addEventListener('click', () => {
    const win = window.open('about:blank', '_blank');
    win.document.open();
    win.document.write(buildDoc());
    win.document.close();
  });

  document.querySelectorAll('.he-textarea').forEach(ta => {
    ta.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = ta.selectionStart;
        const v = ta.value;
        ta.value = v.substring(0, s) + '  ' + v.substring(ta.selectionEnd);
        ta.selectionStart = ta.selectionEnd = s + 2;
        scheduleUpdate();
      }
    });
  });

  // Draggable divider
  let dragging = false;
  let startX, startW;
  const isMobile = () => window.innerWidth <= 680;

  divider.addEventListener('mousedown', e => {
    if (isMobile()) return;
    dragging = true;
    startX = e.clientX;
    startW = editors.getBoundingClientRect().width;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    e.preventDefault();
  });

  divider.addEventListener('touchstart', e => {
    if (isMobile()) return;
    dragging = true;
    startX = e.touches[0].clientX;
    startW = editors.getBoundingClientRect().width;
    divider.classList.add('dragging');
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const totalW = body.getBoundingClientRect().width - divider.offsetWidth;
    const newW = Math.min(Math.max(startW + (e.clientX - startX), 120), totalW - 120);
    editors.style.width = newW + 'px';
  });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const totalW = body.getBoundingClientRect().width - divider.offsetWidth;
    const newW = Math.min(Math.max(startW + (e.touches[0].clientX - startX), 120), totalW - 120);
    editors.style.width = newW + 'px';
  }, { passive: false });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
  });

  document.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
  });

  updatePreview();
})();
</script>
{% endblock %}
