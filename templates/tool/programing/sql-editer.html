{% extends "base.html" %}
{% block title %}SQL エディター — Choco-tube-plus{% endblock %}
{% block body_class %}sql-editor-page{% endblock %}
{% block content %}
<div class="se-wrap">
  <div class="se-topbar">
    <a href="/tool/programing" class="se-back">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15"><polyline points="15 18 9 12 15 6"/></svg>
      戻る
    </a>
    <span class="se-title">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg>
      SQL エディター
    </span>
    <div class="se-actions">
      <span class="se-status" id="sqlStatus">読み込み中…</span>
      <button class="se-btn se-btn-run" id="btnRun" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><polygon points="5,3 19,12 5,21"/></svg>
        実行
      </button>
      <button class="se-btn se-btn-clear" id="btnClear">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        クリア
      </button>
    </div>
  </div>

  <div class="se-body" id="seBody">
    <div class="se-editors" id="seEditors">
      <div class="se-editor-header">SQL</div>
      <textarea class="se-textarea" id="code-sql" spellcheck="false" placeholder="-- SQL をここに書いてください
CREATE TABLE users (id INTEGER, name TEXT, age INTEGER);
INSERT INTO users VALUES (1, 'Alice', 28), (2, 'Bob', 34);
SELECT * FROM users;"></textarea>
    </div>

    <div class="se-divider" id="seDivider">
      <div class="se-divider-handle"></div>
    </div>

    <div class="se-output-wrap" id="seOutput">
      <div class="se-output-header">結果</div>
      <div class="se-output" id="output"><span class="se-hint">実行ボタンを押すとここに結果が表示されます</span></div>
    </div>
  </div>
</div>

<style>
* { box-sizing: border-box; }
.se-wrap { display: flex; flex-direction: column; height: calc(100vh - 56px); background: var(--bg-primary); }
.se-topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2)); background: var(--bg-secondary); flex-shrink: 0; }
.se-back { display: inline-flex; align-items: center; gap: 4px; font-size: .82rem; color: var(--text-secondary); text-decoration: none; transition: color .15s; white-space: nowrap; }
.se-back:hover { color: var(--text-primary); }
.se-title { display: flex; align-items: center; gap: 6px; font-size: .92rem; font-weight: 600; color: var(--text-primary); flex: 1; }
.se-actions { display: flex; align-items: center; gap: 8px; }
.se-status { font-size: .78rem; color: var(--text-secondary); white-space: nowrap; }
.se-status.ready { color: #f59e0b; }
.se-status.running { color: #f59e0b; opacity: .7; }
.se-status.error { color: #ef4444; }
.se-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border: none; border-radius: 7px; font-size: .82rem; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; }
.se-btn:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
.se-btn:disabled { opacity: .4; cursor: not-allowed; }
.se-btn-run { background: #f59e0b; color: #fff; }
.se-btn-clear { background: var(--bg-tertiary, rgba(128,128,128,.15)); color: var(--text-primary); }
.se-body { display: flex; flex: 1; overflow: hidden; user-select: none; }
.se-editors { display: flex; flex-direction: column; width: 50%; min-width: 120px; overflow: hidden; flex-shrink: 0; }
.se-editor-header, .se-output-header { padding: 7px 16px; font-size: .8rem; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border-color, rgba(128,128,128,.2)); background: var(--bg-secondary); flex-shrink: 0; }
.se-divider { width: 6px; flex-shrink: 0; background: var(--border-color, rgba(128,128,128,.2)); cursor: col-resize; display: flex; align-items: center; justify-content: center; transition: background .15s; }
.se-divider:hover, .se-divider.dragging { background: #f59e0b44; }
.se-divider-handle { width: 2px; height: 40px; border-radius: 2px; background: var(--text-secondary); opacity: .4; pointer-events: none; }
.se-divider:hover .se-divider-handle, .se-divider.dragging .se-divider-handle { background: #f59e0b; opacity: 1; }
.se-textarea { flex: 1; width: 100%; height: 100%; background: var(--bg-primary); color: var(--text-primary); border: none; outline: none; padding: 14px 16px; font-family: 'Courier New', Consolas, monospace; font-size: .88rem; line-height: 1.65; resize: none; tab-size: 2; }
.se-textarea::placeholder { color: var(--text-secondary); opacity: .5; }
.se-output-wrap { display: flex; flex-direction: column; flex: 1; min-width: 120px; overflow: hidden; }
.se-output { flex: 1; overflow-y: auto; padding: 14px 16px; font-family: 'Courier New', Consolas, monospace; font-size: .85rem; background: var(--bg-primary); color: var(--text-primary); }
.se-hint { color: var(--text-secondary); opacity: .5; font-style: italic; }
.se-err { color: #ef4444; white-space: pre-wrap; }
.se-info { color: var(--text-secondary); font-style: italic; font-size: .8rem; margin-bottom: 8px; }
.se-result-block { margin-bottom: 20px; }
.se-table-wrap { overflow-x: auto; }
.se-table { border-collapse: collapse; width: 100%; font-size: .82rem; }
.se-table th { background: var(--bg-secondary); color: var(--text-secondary); font-weight: 600; padding: 6px 12px; border: 1px solid var(--border-color, rgba(128,128,128,.2)); text-align: left; white-space: nowrap; }
.se-table td { padding: 5px 12px; border: 1px solid var(--border-color, rgba(128,128,128,.2)); color: var(--text-primary); white-space: nowrap; }
.se-table tr:nth-child(even) td { background: var(--bg-secondary); }
.se-row-count { font-size: .75rem; color: var(--text-secondary); margin-top: 4px; }
@media (max-width: 680px) {
  .se-body { flex-direction: column; }
  .se-editors { width: 100% !important; height: 50%; min-width: unset; }
  .se-divider { width: 100%; height: 6px; cursor: row-resize; }
  .se-divider-handle { width: 40px; height: 2px; }
  .se-output-wrap { width: 100% !important; height: 50%; }
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script>
(function () {
  const codeEl   = document.getElementById('code-sql');
  const outputEl = document.getElementById('output');
  const btnRun   = document.getElementById('btnRun');
  const btnClear = document.getElementById('btnClear');
  const statusEl = document.getElementById('sqlStatus');
  const body     = document.getElementById('seBody');
  const editors  = document.getElementById('seEditors');
  const divider  = document.getElementById('seDivider');

  let SQL = null, db = null;

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'se-status' + (cls ? ' ' + cls : '');
  }

  initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${file}` })
    .then(sql => {
      SQL = sql;
      db = new SQL.Database();
      setStatus('準備完了', 'ready');
      btnRun.disabled = false;
    })
    .catch(e => { setStatus('読み込み失敗', 'error'); });

  function runSQL() {
    if (!db) return;
    outputEl.innerHTML = '';
    const sql = codeEl.value.trim();
    if (!sql) return;
    setStatus('実行中…', 'running');
    try {
      const results = db.exec(sql);
      if (results.length === 0) {
        const info = document.createElement('div');
        info.className = 'se-info';
        info.textContent = '完了（結果なし）';
        outputEl.appendChild(info);
      }
      results.forEach((res, i) => {
        const block = document.createElement('div');
        block.className = 'se-result-block';
        if (results.length > 1) {
          const lbl = document.createElement('div');
          lbl.className = 'se-info';
          lbl.textContent = `結果 ${i + 1}`;
          block.appendChild(lbl);
        }
        const wrap = document.createElement('div');
        wrap.className = 'se-table-wrap';
        const table = document.createElement('table');
        table.className = 'se-table';
        const thead = document.createElement('thead');
        const hrow = document.createElement('tr');
        res.columns.forEach(col => {
          const th = document.createElement('th');
          th.textContent = col;
          hrow.appendChild(th);
        });
        thead.appendChild(hrow);
        table.appendChild(thead);
        const tbody = document.createElement('tbody');
        res.values.forEach(row => {
          const tr = document.createElement('tr');
          row.forEach(val => {
            const td = document.createElement('td');
            td.textContent = val === null ? 'NULL' : val;
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        wrap.appendChild(table);
        block.appendChild(wrap);
        const cnt = document.createElement('div');
        cnt.className = 'se-row-count';
        cnt.textContent = `${res.values.length} 行`;
        block.appendChild(cnt);
        outputEl.appendChild(block);
      });
      setStatus('準備完了', 'ready');
    } catch (e) {
      const err = document.createElement('div');
      err.className = 'se-err';
      err.textContent = e.message;
      outputEl.appendChild(err);
      setStatus('エラー', 'error');
    }
  }

  btnRun.addEventListener('click', runSQL);
  btnClear.addEventListener('click', () => {
    outputEl.innerHTML = '<span class="se-hint">実行ボタンを押すとここに結果が表示されます</span>';
    setStatus('準備完了', 'ready');
  });
  codeEl.addEventListener('keydown', e => {
    if (e.key === 'Tab') { e.preventDefault(); const s = codeEl.selectionStart; codeEl.value = codeEl.value.substring(0, s) + '  ' + codeEl.value.substring(codeEl.selectionEnd); codeEl.selectionStart = codeEl.selectionEnd = s + 2; }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runSQL();
  });

  // Draggable divider
  let dragging = false, startX, startW;
  const isMobile = () => window.innerWidth <= 680;
  divider.addEventListener('mousedown', e => { if (isMobile()) return; dragging = true; startX = e.clientX; startW = editors.getBoundingClientRect().width; divider.classList.add('dragging'); document.body.style.cursor = 'col-resize'; e.preventDefault(); });
  document.addEventListener('mousemove', e => { if (!dragging) return; const totalW = body.getBoundingClientRect().width - divider.offsetWidth; editors.style.width = Math.min(Math.max(startW + (e.clientX - startX), 120), totalW - 120) + 'px'; });
  document.addEventListener('mouseup', () => { if (!dragging) return; dragging = false; divider.classList.remove('dragging'); document.body.style.cursor = ''; });
  divider.addEventListener('touchstart', e => { if (isMobile()) return; dragging = true; startX = e.touches[0].clientX; startW = editors.getBoundingClientRect().width; divider.classList.add('dragging'); e.preventDefault(); }, { passive: false });
  document.addEventListener('touchmove', e => { if (!dragging) return; const totalW = body.getBoundingClientRect().width - divider.offsetWidth; editors.style.width = Math.min(Math.max(startW + (e.touches[0].clientX - startX), 120), totalW - 120) + 'px'; }, { passive: false });
  document.addEventListener('touchend', () => { if (!dragging) return; dragging = false; divider.classList.remove('dragging'); });
})();
</script>
{% endblock %}
