{% extends "base.html" %}
{% block title %}お問い合わせ — Choco-Tube-Plus{% endblock %}
{% block body_class %}contact-page{% endblock %}
{% block head %}
<style>
.contact-main {
  max-width: 760px;
  margin: 0 auto;
  padding: 28px 16px 60px;
}
.contact-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.contact-back {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: .83rem;
  color: var(--text-secondary, #8a9bb0);
  text-decoration: none;
  margin-bottom: 14px;
  transition: color .15s;
}
.contact-back:hover { color: var(--text-primary, #e2e8f0); }
.contact-title {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text-primary, #e2e8f0);
  margin: 0;
}
.contact-desc {
  font-size: .82rem;
  color: var(--text-secondary, #8a9bb0);
  margin-bottom: 20px;
  line-height: 1.6;
}
.contact-form-wrap {
  background: var(--card-bg, rgba(20,25,40,0.7));
  border: 1px solid var(--card-border, rgba(99,115,150,0.18));
  border-radius: 16px;
  overflow: hidden;
}
.contact-form-wrap iframe {
  width: 100%;
  height: calc(100vh - 240px);
  min-height: 560px;
  border: none;
  display: block;
}
.contact-note {
  padding: 12px 18px;
  font-size: .72rem;
  color: var(--text-secondary, #8a9bb0);
  font-family: 'Share Tech Mono', monospace;
  border-top: 1px solid var(--card-border, rgba(99,115,150,0.15));
  text-align: center;
}
.contact-note a {
  color: var(--accent-secondary, #f4a460);
  text-decoration: none;
}
.contact-note a:hover { text-decoration: underline; }
.contact-direct-btn {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: .75rem;
  font-weight: 600;
  color: var(--accent-secondary, #f4a460);
  text-decoration: none;
  padding: 5px 12px;
  border: 1px solid rgba(210,105,30,0.35);
  border-radius: 8px;
  background: rgba(210,105,30,0.08);
  transition: background .15s, border-color .15s, color .15s;
  white-space: nowrap;
}
.contact-direct-btn:hover {
  background: rgba(210,105,30,0.18);
  border-color: rgba(210,105,30,0.6);
  color: #f5ead8;
}
</style>
{% endblock %}
{% block content %}
<main class="contact-main">
  <a href="/about" class="contact-back">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
    概要に戻る
  </a>
  <div class="contact-header">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    <h1 class="contact-title">お問い合わせ</h1>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdjozOQ4mH-QdhKxro6O8VgRB1EgxSDu_oqcBqDgfOQ5P2bBg/viewform" target="_blank" rel="noopener" class="contact-direct-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="14" height="14"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      直接開く
    </a>
  </div>
  <p class="contact-desc">バグ報告・機能追加のリクエスト・質問など、なんでもお気軽にどうぞ。</p>
  <div class="contact-form-wrap">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSdjozOQ4mH-QdhKxro6O8VgRB1EgxSDu_oqcBqDgfOQ5P2bBg/viewform?embedded=true"
      title="お問い合わせフォーム"
      loading="lazy"
    >読み込み中...</iframe>
    <div class="contact-note">
      フォームが表示されない場合は
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdjozOQ4mH-QdhKxro6O8VgRB1EgxSDu_oqcBqDgfOQ5P2bBg/viewform" target="_blank" rel="noopener">こちら</a>
      から直接開いてください。
    </div>
  </div>
</main>
{% endblock %}
